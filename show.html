<!DOCTYPE html>
<html>
    <body>
        <h2> javascript while loop</h2>
        <p id="hour"></p>
        <script>
            var text ="";
            var i = 0;
            while (i < 10) {
                text += "<br>The number is " + i;
                i++;
            }
            document.getElementById("hour").innerHTML = text;
        </script>
    </body>
</html>
